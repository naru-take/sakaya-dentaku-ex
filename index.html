<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
>

<title>酒屋の電卓EX</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="酒屋EX">

<style>
:root{
  --bg:#111;
  --header:#1c1c1c;
  --panel:#242424;
  --key:#4a4a4a;
  --gray:#808080;
  --orange:#ff9500;
  --green:#00e8c6;
  --text:#fff;
  --sub:#aaa;
  --danger:#ff453a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;
  user-select:none;
}

html,
body{
  width:100%;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

body{
  min-height:100dvh;
  padding:
    env(safe-area-inset-top)
    12px
    calc(18px + env(safe-area-inset-bottom));
}

header{
  background:var(--header);
  margin:0 -12px 12px;
  padding:18px 12px;
  text-align:center;
  font-size:22px;
  font-weight:700;
}

.tabs{
  display:flex;
  background:var(--panel);
  margin-bottom:12px;
  border-radius:12px;
  overflow:hidden;
}

.tab{
  flex:1;
  min-width:0;
  border:0;
  padding:11px 1px;
  background:var(--panel);
  color:var(--sub);
  font-size:13px;
}

.tab.active{
  color:#fff;
  background:#363636;
  border-bottom:4px solid var(--orange);
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.display-box{
  background:#000;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:12px;
}

/* 計算式 */
.expression-display{
    min-height:68px;
    max-height:96px;
    padding:10px 18px 8px;

    display:flex;
    flex-wrap:wrap;
    align-content:flex-end;
    align-items:center;
    justify-content:flex-end;

    column-gap:5px;
    row-gap:2px;

    overflow-x:hidden;
    overflow-y:hidden;
    white-space:normal;

    font-size:32px;
    line-height:1.15;
    font-weight:300;

    scrollbar-width:none;
}

.expression-display::-webkit-scrollbar{
  display:none;
}

/* タップできる数字 */
.expression-token{
  display:inline-block;
  padding:3px 2px;
  border-radius:7px;
  transition:.12s;
  cursor:pointer;
}

.expression-token.number:active{
  background:#333;
}

/* 修正対象 */
.expression-token.selected{
  color:#111;
  background:var(--green);
  padding:3px 6px;
}

/* 演算子 */
.expression-token.operator{
  color:#ddd;
  padding-left:5px;
  padding-right:5px;
}

/* 計算結果 */
.total-display{
  min-height:64px;
  padding:8px 18px 13px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  background:#090909;
  color:var(--green);
  font-size:32px;
  font-weight:700;
  overflow:hidden;
  white-space:nowrap;
}

.total-currency{
  margin-left:3px;
  font-size:20px;
}

.edit-guide{
  min-height:21px;
  margin:-4px 3px 9px;
  color:#888;
  font-size:12px;
  text-align:right;
}

.edit-guide.active{
  color:var(--green);
}

.tax-container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.taxbox{
  min-width:0;
  background:var(--panel);
  padding:12px;
  border-radius:14px;
  line-height:1.6;
  font-size:15px;
}

.taxbox b{
  font-size:19px;
}

.tax-line{
  display:flex;
  justify-content:space-between;
  gap:5px;
}

.tax-value{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.keys{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.key{
  height:64px;
  border:0;
  border-radius:17px;
  background:var(--key);
  color:#fff;
  font-size:27px;
  font-weight:400;
  touch-action:manipulation;
  transition:transform .06s,filter .06s;
}

.key:active{
  transform:scale(.95);
  filter:brightness(1.18);
}

.key.gray{
  background:var(--gray);
}

.key.orange{
  background:var(--orange);
}

.key.zero{
  grid-column:span 2;
}

/* 履歴 */
.history-area{
  margin-top:18px;
}

.history-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
  padding:0 3px;
}

.history-title{
  font-size:17px;
  font-weight:700;
}

.clear-history{
  border:0;
  background:transparent;
  color:#888;
  font-size:13px;
  padding:7px;
}

.history-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.history-empty{
  padding:18px;
  background:#1c1c1c;
  border-radius:13px;
  color:#777;
  text-align:center;
  font-size:14px;
}

.history-item{
  position:relative;
  background:#202020;
  border-radius:13px;
  padding:12px 48px 12px 14px;
  cursor:pointer;
}

.history-item:active{
  background:#2b2b2b;
}

.history-expression{
  color:#bbb;
  font-size:14px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.history-result{
  margin-top:4px;
  color:var(--green);
  font-size:22px;
  font-weight:700;
}

.history-delete{
  position:absolute;
  top:50%;
  right:9px;
  width:34px;
  height:34px;
  transform:translateY(-50%);
  border:0;
  border-radius:50%;
  background:#333;
  color:#aaa;
  font-size:17px;
}

.history-delete:active{
  color:#fff;
  background:var(--danger);
}

.placeholder{
  background:var(--panel);
  border-radius:16px;
  padding:28px 18px;
  text-align:center;
  color:var(--sub);
}

@media (max-height:750px){
  header{
    padding:12px;
    margin-bottom:8px;
  }

  .tabs{
    margin-bottom:8px;
  }

  .tab{
    padding:8px 1px;
  }

  .expression-display{
    min-height:55px;
    font-size:30px;
  }

  .total-display{
    min-height:48px;
    font-size:27px;
  }

  .tax-container{
    margin-bottom:8px;
  }

  .taxbox{
    padding:8px 10px;
    line-height:1.45;
  }

  .keys{
    gap:7px;
  }

  .key{
    height:54px;
  }
}
</style>
</head>

<body>

<header>🧮 酒屋の電卓EX</header>

<nav class="tabs">
  <button class="tab active">税率</button>
  <button class="tab">粗利</button>
  <button class="tab">値引</button>
  <button class="tab">ケース</button>
  <button class="tab">利益率</button>
  <button class="tab">度数</button>
</nav>

<main>

<section class="page active">

  <div class="display-box">

    <div
      id="expressionDisplay"
      class="expression-display"
    ></div>

    <div class="total-display">
      <span id="totalDisplay">0</span>
      <span class="total-currency">円</span>
    </div>

  </div>

  <div id="editGuide" class="edit-guide">
    計算式の数字をタップすると修正できます
  </div>

  <div class="tax-container">

    <div class="taxbox">
      <b>8%</b>

      <div class="tax-line">
        <span>税込:</span>
        <span id="tax8in" class="tax-value">0円</span>
      </div>

      <div class="tax-line">
        <span>税抜:</span>
        <span id="tax8ex" class="tax-value">0円</span>
      </div>
    </div>

    <div class="taxbox">
      <b>10%</b>

      <div class="tax-line">
        <span>税込:</span>
        <span id="tax10in" class="tax-value">0円</span>
      </div>

      <div class="tax-line">
        <span>税抜:</span>
        <span id="tax10ex" class="tax-value">0円</span>
      </div>
    </div>

  </div>

  <div class="keys">

    <button class="key gray" data-key="clear">C</button>
    <button class="key gray" data-value="/">÷</button>
    <button class="key gray" data-value="*">×</button>
    <button class="key orange" data-key="backspace">←</button>

    <button class="key" data-value="7">7</button>
    <button class="key" data-value="8">8</button>
    <button class="key" data-value="9">9</button>
    <button class="key orange" data-value="-">−</button>

    <button class="key" data-value="4">4</button>
    <button class="key" data-value="5">5</button>
    <button class="key" data-value="6">6</button>
    <button class="key orange" data-value="+">＋</button>

    <button class="key" data-value="1">1</button>
    <button class="key" data-value="2">2</button>
    <button class="key" data-value="3">3</button>
    <button class="key orange" data-key="equals">＝</button>

    <button class="key zero" data-value="0">0</button>
    <button class="key" data-value=".">.</button>

  </div>

  <div class="history-area">

    <div class="history-header">
      <div class="history-title">計算履歴</div>
      <button id="clearHistory" class="clear-history">
        すべて消去
      </button>
    </div>

    <div id="historyList" class="history-list"></div>

  </div>

</section>

<section class="page">
  <div class="placeholder">粗利計算は次に追加します</div>
</section>

<section class="page">
  <div class="placeholder">値引計算は次に追加します</div>
</section>

<section class="page">
  <div class="placeholder">ケース計算は次に追加します</div>
</section>

<section class="page">
  <div class="placeholder">利益率計算は次に追加します</div>
</section>

<section class="page">
  <div class="placeholder">度数計算は次に追加します</div>
</section>

</main>

<script>
"use strict";

let tokens = ["0"];

/*
  数字をタップして選択したときの位置
  nullなら通常入力
*/
let selectedTokenIndex = null;

/*
  選択後、最初の数字入力かどうか
*/
let replaceSelectedNumber = false;

/*
  ＝を押した直後かどうか
*/
let justCalculated = false;

/*
  計算履歴
*/
let history = loadHistory();

const operators = ["+", "-", "*", "/"];

const expressionDisplay =
  document.getElementById("expressionDisplay");

const totalDisplay =
  document.getElementById("totalDisplay");

const editGuide =
  document.getElementById("editGuide");

const tax8in =
  document.getElementById("tax8in");

const tax8ex =
  document.getElementById("tax8ex");

const tax10in =
  document.getElementById("tax10in");

const tax10ex =
  document.getElementById("tax10ex");

const historyList =
  document.getElementById("historyList");

const clearHistoryButton =
  document.getElementById("clearHistory");

/* 電卓ボタン */
document.querySelectorAll(".key").forEach(button => {

  button.addEventListener("click", () => {

    const value = button.dataset.value;
    const key = button.dataset.key;

    if (value !== undefined) {
      handleInput(value);
      return;
    }

    if (key === "clear") {
      clearAll();
      return;
    }

    if (key === "backspace") {
      backspace();
      return;
    }

    if (key === "equals") {
      calculateFinal();
    }

  });

});

/* タブ切替 */
document.querySelectorAll(".tab").forEach((tab, index) => {

  tab.addEventListener("click", () => {

    document.querySelectorAll(".tab").forEach(item => {
      item.classList.remove("active");
    });

    document.querySelectorAll(".page").forEach(page => {
      page.classList.remove("active");
    });

    tab.classList.add("active");

    document
      .querySelectorAll(".page")[index]
      .classList.add("active");

  });

});

/* 履歴全削除 */
clearHistoryButton.addEventListener("click", () => {

  if (history.length === 0) {
    return;
  }

  const ok = confirm("計算履歴をすべて消しますか？");

  if (!ok) {
    return;
  }

  history = [];
  saveHistory();
  renderHistory();

});

/* 入力振り分け */
function handleInput(value) {

  if (operators.includes(value)) {
    inputOperator(value);
  } else {
    inputNumber(value);
  }

  updateScreen();
}

/* 数字または小数点 */
function inputNumber(value) {

  /*
    計算式の数字を選択中
  */
  if (selectedTokenIndex !== null) {

    let current = tokens[selectedTokenIndex];

    if (replaceSelectedNumber) {

      current = value === "." ? "0." : value;
      replaceSelectedNumber = false;

    } else {

      if (value === "." && current.includes(".")) {
        return;
      }

      current += value;
    }

    tokens[selectedTokenIndex] = current;

    justCalculated = false;
    return;
  }

  /*
    ＝の直後に数字を押したら新規計算
  */
  if (justCalculated) {
    tokens = [value === "." ? "0." : value];
    justCalculated = false;
    return;
  }

  const lastIndex = tokens.length - 1;
  const lastToken = tokens[lastIndex];

  /*
    最後が演算子なら新しい数字を追加
  */
  if (operators.includes(lastToken)) {
    tokens.push(value === "." ? "0." : value);
    return;
  }

  /*
    小数点の重複防止
  */
  if (value === "." && lastToken.includes(".")) {
    return;
  }

  /*
    最初の0を置き換える
  */
  if (tokens.length === 1 && lastToken === "0") {
    tokens[0] = value === "." ? "0." : value;
    return;
  }

  tokens[lastIndex] += value;
}

/* 演算子入力 */
function inputOperator(value) {

  /*
    数字選択を終了
  */
  deselectToken();

  /*
    ＝の後なら結果から続ける
  */
  if (justCalculated) {
    justCalculated = false;
  }

  const lastToken = tokens[tokens.length - 1];

  /*
    最後が演算子なら差し替え
  */
  if (operators.includes(lastToken)) {
    tokens[tokens.length - 1] = value;
    return;
  }

  tokens.push(value);
}

/* 数字をタップして編集対象にする */
function selectNumber(index) {

  if (
    index < 0 ||
    index >= tokens.length ||
    operators.includes(tokens[index])
  ) {
    return;
  }

  selectedTokenIndex = index;
  replaceSelectedNumber = true;

  justCalculated = false;

  updateScreen();
}

/* 選択解除 */
function deselectToken() {
  selectedTokenIndex = null;
  replaceSelectedNumber = false;
}

/* 全消去 */
function clearAll() {

  tokens = ["0"];
  justCalculated = false;

  deselectToken();
  updateScreen();
}

/* 1文字削除 */
function backspace() {

  /*
    選択中の数字を削除
  */
  if (selectedTokenIndex !== null) {

    let current = tokens[selectedTokenIndex];

    if (replaceSelectedNumber) {

      tokens[selectedTokenIndex] = "0";
      replaceSelectedNumber = false;

    } else if (current.length <= 1) {

      tokens[selectedTokenIndex] = "0";

    } else {

      tokens[selectedTokenIndex] =
        current.slice(0, -1);
    }

    justCalculated = false;
    updateScreen();
    return;
  }

  justCalculated = false;

  const lastIndex = tokens.length - 1;
  const lastToken = tokens[lastIndex];

  if (operators.includes(lastToken)) {

    tokens.pop();

  } else if (lastToken.length > 1) {

    tokens[lastIndex] =
      lastToken.slice(0, -1);

  } else if (tokens.length > 1) {

    tokens.pop();

  } else {

    tokens = ["0"];
  }

  if (tokens.length === 0) {
    tokens = ["0"];
  }

  updateScreen();
}

/* ＝ */
function calculateFinal() {

  deselectToken();

  const cleanedTokens = removeTrailingOperators(tokens);
  const result = calculateTokens(cleanedTokens);

  if (result === null) {
    return;
  }

  /*
    履歴に保存
  */
  addHistory(cleanedTokens, result);

  /*
    式はそのまま残す
  */
  tokens = cleanedTokens;
  justCalculated = true;

  updateScreen();
}

/* 末尾の演算子を除去 */
function removeTrailingOperators(sourceTokens) {

  const copied = [...sourceTokens];

  while (
    copied.length > 1 &&
    operators.includes(copied[copied.length - 1])
  ) {
    copied.pop();
  }

  return copied;
}

/* 計算 */
function calculateTokens(sourceTokens) {

  const expression = sourceTokens.join("");

  if (!/^[0-9+\-*/.]+$/.test(expression)) {
    return null;
  }

  try {

    const result = Function(
      '"use strict"; return (' + expression + ')'
    )();

    if (!Number.isFinite(result)) {
      return null;
    }

    return normalizeNumber(result);

  } catch {
    return null;
  }
}

/* 小数誤差調整 */
function normalizeNumber(number) {

  return Math.round(
    (number + Number.EPSILON) * 1000000
  ) / 1000000;
}

/* 数字を表示用に整形 */
function formatNumber(
  number,
  maximumFractionDigits = 6
) {

  if (!Number.isFinite(number)) {
    return "エラー";
  }

  if (Math.abs(number) >= 1e15) {
    return number.toExponential(6);
  }

  return number.toLocaleString("ja-JP", {
    maximumFractionDigits
  });
}

/* 入力中の数字を整形 */
function formatTokenNumber(value) {

  if (value === "") {
    return "";
  }

  if (value === ".") {
    return "0.";
  }

  const endsWithDot = value.endsWith(".");
  const number = Number(value);

  if (!Number.isFinite(number)) {
    return value;
  }

  const decimalPart =
    value.includes(".")
      ? value.split(".")[1]
      : "";

  let formatted = number.toLocaleString("ja-JP", {
    minimumFractionDigits:
      endsWithDot ? 0 : decimalPart.length,
    maximumFractionDigits:
      decimalPart.length
  });

  if (endsWithDot) {
    formatted += ".";
  }

  return formatted;
}

/* 演算子表示 */
function operatorSymbol(operator) {

  if (operator === "+") return "＋";
  if (operator === "-") return "−";
  if (operator === "*") return "×";
  if (operator === "/") return "÷";

  return operator;
}

/* 計算式描画 */
function renderExpression() {

  expressionDisplay.innerHTML = "";

  tokens.forEach((token, index) => {

    const span =
      document.createElement("span");

    span.classList.add("expression-token");

    if (operators.includes(token)) {

      span.classList.add("operator");
      span.textContent = operatorSymbol(token);

    } else {

      span.classList.add("number");
      span.textContent = formatTokenNumber(token);

      span.addEventListener("click", event => {
        event.stopPropagation();
        selectNumber(index);
      });

      if (selectedTokenIndex === index) {
        span.classList.add("selected");
      }
    }

    expressionDisplay.appendChild(span);

  });

  /*
    ＝を押した後だけ末尾に＝を表示
  */
  if (justCalculated) {

    const equals =
      document.createElement("span");

    equals.className =
      "expression-token operator";

    equals.textContent = "＝";

    expressionDisplay.appendChild(equals);
  }

  requestAnimationFrame(() => {
    expressionDisplay.scrollLeft =
      expressionDisplay.scrollWidth;
  });
}

/* 画面更新 */
function updateScreen() {

  const cleanedTokens =
    removeTrailingOperators(tokens);

  const result =
    calculateTokens(cleanedTokens);

  const total =
    result === null ? 0 : result;

  renderExpression();

  totalDisplay.textContent =
    formatNumber(total);

  tax8in.textContent =
    formatNumber(
      Math.round(total * 1.08),
      0
    ) + "円";

  tax8ex.textContent =
    formatNumber(
      Math.round(total / 1.08),
      0
    ) + "円";

  tax10in.textContent =
    formatNumber(
      Math.round(total * 1.10),
      0
    ) + "円";

  tax10ex.textContent =
    formatNumber(
      Math.round(total / 1.10),
      0
    ) + "円";

  if (selectedTokenIndex !== null) {

    editGuide.textContent =
      "選んだ数字を入力し直してください";

    editGuide.classList.add("active");

  } else {

    editGuide.textContent =
      "計算式の数字をタップすると修正できます";

    editGuide.classList.remove("active");
  }
}

/* 履歴追加 */
function addHistory(sourceTokens, result) {

  const expression = sourceTokens.join("");

  /*
    同じ式と結果の連続登録を防ぐ
  */
  const latest = history[0];

  if (
    latest &&
    latest.expression === expression &&
    latest.result === result
  ) {
    return;
  }

  history.unshift({
    expression,
    result,
    createdAt: Date.now()
  });

  /*
    最大30件
  */
  history = history.slice(0, 30);

  saveHistory();
  renderHistory();
}

/* 履歴表示 */
function renderHistory() {

  historyList.innerHTML = "";

  if (history.length === 0) {

    const empty =
      document.createElement("div");

    empty.className = "history-empty";
    empty.textContent = "まだ履歴はありません";

    historyList.appendChild(empty);
    return;
  }

  history.forEach((item, index) => {

    const row =
      document.createElement("div");

    row.className = "history-item";

    const expression =
      document.createElement("div");

    expression.className =
      "history-expression";

    expression.textContent =
      formatHistoryExpression(item.expression) + " ＝";

    const result =
      document.createElement("div");

    result.className =
      "history-result";

    result.textContent =
      formatNumber(item.result) + "円";

    const deleteButton =
      document.createElement("button");

    deleteButton.className =
      "history-delete";

    deleteButton.textContent = "×";

    deleteButton.addEventListener(
      "click",
      event => {

        event.stopPropagation();

        history.splice(index, 1);
        saveHistory();
        renderHistory();
      }
    );

    row.addEventListener("click", () => {

      tokens =
        tokenizeExpression(item.expression);

      justCalculated = true;

      deselectToken();
      updateScreen();

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });
    });

    row.appendChild(expression);
    row.appendChild(result);
    row.appendChild(deleteButton);

    historyList.appendChild(row);
  });
}

/* 履歴用の式整形 */
function formatHistoryExpression(expression) {

  const expressionTokens =
    tokenizeExpression(expression);

  return expressionTokens.map(token => {

    if (operators.includes(token)) {
      return " " + operatorSymbol(token) + " ";
    }

    return formatTokenNumber(token);

  }).join("");
}

/* 文字列をトークンに分解 */
function tokenizeExpression(expression) {

  const matches =
    expression.match(/(\d+(?:\.\d+)?|[+\-*/])/g);

  return matches && matches.length
    ? matches
    : ["0"];
}

/* 履歴保存 */
function saveHistory() {

  try {
    localStorage.setItem(
      "sakayaDentakuHistory",
      JSON.stringify(history)
    );
  } catch (error) {
    console.log("履歴保存失敗:", error);
  }
}

/* 履歴読込 */
function loadHistory() {

  try {

    const saved =
      localStorage.getItem(
        "sakayaDentakuHistory"
      );

    if (!saved) {
      return [];
    }

    const parsed = JSON.parse(saved);

    return Array.isArray(parsed)
      ? parsed
      : [];

  } catch {
    return [];
  }
}

        );
      });

}
